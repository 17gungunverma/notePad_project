<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VirtuBox - Note Taking App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="app">

      <!-- Auth Section -->
      <div id="auth-section" class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h1 class="logo"> VirtuBox</h1>
            <p class="tagline">Think It, Note It, Keep It.</p>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form active">
            <h2>Login</h2>
            <div class="form-group">
              <label for="login-email">Email</label>
              <input
                type="email"
                id="login-email"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <p class="auth-switch">
              Don't have an account?
              <button type="button" id="show-signup-btn" class="link-btn">Sign Up</button>
            </p>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="auth-form">
            <h2>Sign Up</h2>
            <div class="form-group">
              <label for="signup-username">Username</label>
              <input
                type="text"
                id="signup-username"
                placeholder="Choose a username"
                required
              />
            </div>
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input
                type="email"
                id="signup-email"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input
                type="password"
                id="signup-password"
                placeholder="Create a password (min 6 chars)"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
            <p class="auth-switch">
              Already have an account?
              <button type="button" id="show-login-btn" class="link-btn">Login</button>
            </p>
          </form>

          <div id="auth-message" class="message"></div>
        </div>
      </div>

      <!-- Dashboard Section -->
      <div id="dashboard-section" class="dashboard-container" style="display: none">
        <header class="dashboard-header">
          <h1 class="dashboard-title">📝 VirtuBox</h1>
          <div class="user-info">
            <span id="username-display"></span>
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
          </div>
        </header>

        <main class="dashboard-main">
          <section class="notes-section">
            <div class="section-header">
              <h2>My Notes</h2>
              <button id="create-note-btn" class="btn btn-primary">+ New Note</button>
            </div>

            <!-- Create/Edit Note Form -->
            <div id="note-form-container" class="note-form-container" style="display: none">
              <form id="note-form" class="note-form">
                <h3 id="form-title">Create New Note</h3>
                <div class="form-group">
                  <label for="note-title">Title</label>
                  <input
                    type="text"
                    id="note-title"
                    placeholder="Enter note title"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="note-description">Description</label>
                  <textarea
                    id="note-description"
                    placeholder="Enter note content"
                    rows="5"
                    required
                  ></textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary" id="submit-note-btn">
                    Save Note
                  </button>
                  <button type="button" class="btn btn-secondary" id="cancel-note-btn">
                    Cancel
                  </button>
                </div>
                <div id="form-message" class="message"></div>
              </form>
            </div>

            <!-- Notes List -->
            <div id="notes-list" class="notes-list">
              <p class="empty-state">No notes yet. Create one to get started!</p>
            </div>
          </section>
        </main>
      </div>
    </div>
 <div id="toast-container"></div>
    <script src="app.js"></script>
   
  </body>
</html>
